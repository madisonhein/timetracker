<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker — Weekly Summary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
    }

    nav .brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: auto;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    nav a.active { color: #fff; border-bottom: 3px solid #4f8ef7; }

    .page {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px 48px;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .week-label {
      font-size: 0.9rem;
      color: #666;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 14px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .card-title {
      padding: 16px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #444;
      background: #f8f9fa;
      border-bottom: 1px solid #e5e7eb;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      background: #f8f9fa;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }

    td {
      padding: 12px 16px;
      font-size: 0.93rem;
      vertical-align: middle;
    }

    .hours-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.88rem;
    }

    .hours-badge.zero  { background: #f1f5f9; color: #94a3b8; }
    .hours-badge.low   { background: #fef9c3; color: #a16207; }
    .hours-badge.mid   { background: #dbeafe; color: #1e40af; }
    .hours-badge.high  { background: #dcfce7; color: #166534; }

    .active-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .shift-log { margin-top: 8px; }

    .shift-row {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.88rem;
      display: grid;
      grid-template-columns: 160px 1fr 90px 1fr;
      gap: 8px;
      align-items: start;
    }

    .shift-row:last-child { border-bottom: none; }

    .shift-row .emp-name { font-weight: 600; color: #333; }
    .shift-row .times { color: #555; line-height: 1.5; }
    .shift-row .duration { color: #4f8ef7; font-weight: 600; }
    .shift-row .note-text { color: #666; font-style: italic; }

    .no-shifts {
      padding: 32px;
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #555;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover:not(:disabled) { border-color: #4f8ef7; color: #4f8ef7; }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .week-label-text {
      font-size: 0.9rem;
      color: #666;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 14px;
      white-space: nowrap;
    }

    .loading { padding: 32px; text-align: center; color: #aaa; }

    .shift-row { grid-template-columns: 150px 1fr 80px 1fr auto; }

    .edit-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #555;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .edit-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      margin: 16px;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .modal label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .modal input, .modal textarea, .modal select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus {
      border-color: #4f8ef7;
      background: #fff;
    }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal .field { margin-bottom: 16px; }
    .modal .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save   { background: #4f8ef7; color: #fff; }
    .btn-save:hover { opacity: 0.88; }
    .btn-cancel { background: #f1f5f9; color: #555; }
    .btn-cancel:hover { background: #e2e8f0; }

    .modal-message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      display: none;
    }
    .modal-message.error { background: #fee2e2; border: 1.5px solid #fca5a5; color: #991b1b; display: block; }
  </style>
</head>
<body>

<nav>
  <span class="brand">TimeTracker</span>
  <a href="/">Clock In/Out</a>
  <a href="/summary.html" class="active">Weekly Summary</a>
  <a href="/manual-entry.html">Manual Entry</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Weekly Summary</h1>
    <div class="week-nav">
      <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">&#8592; Prev</button>
      <span class="week-label-text" id="weekLabel">Loading…</span>
      <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">Next &#8594;</button>
    </div>
  </div>

  <!-- Hours totals table -->
  <div class="card">
    <div class="card-title">Hours This Week</div>
    <div id="totalsTable"><div class="loading">Loading…</div></div>
  </div>

  <!-- Shift log -->
  <div class="card">
    <div class="card-title">Shift Log</div>
    <div id="shiftLog"><div class="loading">Loading…</div></div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Edit Shift</h2>
    <div class="field">
      <label>Employee</label>
      <select id="modalEmployee"></select>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="modalDate" />
    </div>
    <div class="time-row">
      <div class="field">
        <label>Clock In</label>
        <input type="time" id="modalClockIn" />
      </div>
      <div class="field">
        <label>Clock Out</label>
        <input type="time" id="modalClockOut" />
      </div>
    </div>
    <div class="field">
      <label>Description <span style="color:#ef4444;">*</span></label>
      <textarea id="modalNote"></textarea>
    </div>
    <div class="modal-message" id="modalMessage"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  function formatHours(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }

  function hoursBadgeClass(minutes) {
    if (minutes === 0) return 'zero';
    if (minutes < 120) return 'low';
    if (minutes < 300) return 'mid';
    return 'high';
  }

  function formatDatetime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString([], {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString([], {
      weekday: 'short', month: 'short', day: 'numeric'
    });
  }

  let weekOffset = 0;

  function getCurrentTuesday() {
    const now = new Date();
    const day = now.getDay();
    const diff = day >= 2 ? 2 - day : 2 - day - 7;
    const tuesday = new Date(now);
    tuesday.setHours(0, 0, 0, 0);
    tuesday.setDate(now.getDate() + diff);
    return tuesday;
  }

  function getWeekStartForOffset(offset) {
    const tuesday = getCurrentTuesday();
    tuesday.setDate(tuesday.getDate() + offset * 7);
    return tuesday.toISOString().slice(0, 10);
  }

  function changeWeek(dir) {
    weekOffset += dir;
    loadSummary();
  }

  async function loadSummary() {
    const weekStart = getWeekStartForOffset(weekOffset);
    const res = await fetch(`/api/weekly-summary?weekStart=${weekStart}`);
    const data = await res.json();

    // Disable Next button when on current week
    document.getElementById('nextBtn').disabled = weekOffset >= 0;

    // Week label
    document.getElementById('weekLabel').textContent =
      `${formatDate(data.weekStart + 'T12:00:00')} – ${formatDate(data.weekEnd + 'T12:00:00')}`;

    // Totals table
    const employees = Object.keys(data.summary);
    let totalsHtml = `
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Status</th>
            <th>Total Hours</th>
            <th>Shifts</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (const emp of employees) {
      const { totalMinutes, shifts } = data.summary[emp];
      const activeShift = shifts.find(s => s.clockOut === null);
      const completedShifts = shifts.filter(s => s.clockOut !== null).length;
      const cls = hoursBadgeClass(totalMinutes);

      totalsHtml += `
        <tr>
          <td><strong>${emp}</strong></td>
          <td>
            ${activeShift
              ? `<span class="active-dot"></span><span style="color:#15803d;font-size:0.88rem;font-weight:600;">Clocked In</span>`
              : `<span style="color:#aaa;font-size:0.88rem;">—</span>`
            }
          </td>
          <td><span class="hours-badge ${cls}">${formatHours(totalMinutes)}</span></td>
          <td style="color:#888; font-size:0.88rem;">${completedShifts} shift${completedShifts !== 1 ? 's' : ''}</td>
        </tr>
      `;
    }

    totalsHtml += '</tbody></table>';
    document.getElementById('totalsTable').innerHTML = totalsHtml;

    // Shift log — collect all shifts, sort by clockIn desc
    const allShifts = [];
    for (const emp of employees) {
      for (const shift of data.summary[emp].shifts) {
        allShifts.push({ emp, ...shift });
      }
    }
    allShifts.sort((a, b) => new Date(b.clockIn) - new Date(a.clockIn));

    if (allShifts.length === 0) {
      document.getElementById('shiftLog').innerHTML =
        '<div class="no-shifts">No shifts recorded this week.</div>';
      return;
    }

    let logHtml = '<div class="shift-log">';
    for (const s of allShifts) {
      const duration = s.minutes !== null ? formatHours(s.minutes) : '<span style="color:#22c55e;font-weight:600;">Active</span>';
      const clockOutStr = s.clockOut ? formatDatetime(s.clockOut) : '<em style="color:#22c55e;">In progress</em>';
      const editBtn = s.clockOut
        ? `<button class="edit-btn" onclick='openModal(${JSON.stringify(s)})'>Edit</button>`
        : `<span></span>`;

      logHtml += `
        <div class="shift-row">
          <div class="emp-name">${s.emp}</div>
          <div class="times">
            <div>In: ${formatDatetime(s.clockIn)}</div>
            <div>Out: ${clockOutStr}</div>
          </div>
          <div class="duration">${duration}</div>
          <div class="note-text">${s.note || '<span style="color:#ccc;">No note</span>'}</div>
          <div>${editBtn}</div>
        </div>
      `;
    }
    logHtml += '</div>';
    document.getElementById('shiftLog').innerHTML = logHtml;
  }

  // Modal
  let editingOriginalClockIn = null;

  async function openModal(shift) {
    // Populate employee dropdown if empty
    const empSelect = document.getElementById('modalEmployee');
    if (empSelect.options.length === 0) {
      const res = await fetch('/api/employees');
      const employees = await res.json();
      employees.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        empSelect.appendChild(opt);
      });
    }

    editingOriginalClockIn = shift.clockIn;
    empSelect.value = shift.emp;
    document.getElementById('modalDate').value = shift.date;
    document.getElementById('modalClockIn').value = new Date(shift.clockIn).toTimeString().slice(0, 5);
    document.getElementById('modalClockOut').value = new Date(shift.clockOut).toTimeString().slice(0, 5);
    document.getElementById('modalNote').value = shift.note || '';
    document.getElementById('modalMessage').className = 'modal-message';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingOriginalClockIn = null;
  }

  async function saveEdit() {
    const employee = document.getElementById('modalEmployee').value;
    const date     = document.getElementById('modalDate').value;
    const clockIn  = document.getElementById('modalClockIn').value;
    const clockOut = document.getElementById('modalClockOut').value;
    const note     = document.getElementById('modalNote').value.trim();
    const msgEl    = document.getElementById('modalMessage');

    if (!note) {
      msgEl.textContent = 'Description is required.';
      msgEl.className = 'modal-message error';
      return;
    }

    const res = await fetch('/api/entry', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ originalClockIn: editingOriginalClockIn, employee, date, clockIn, clockOut, note })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = data.error || 'An error occurred.';
      msgEl.className = 'modal-message error';
      return;
    }

    closeModal();
    loadSummary();
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  loadSummary();
</script>
</body>
</html>
