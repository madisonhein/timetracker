<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker — Clock In/Out</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      height: 56px;
    }

    nav .brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: auto;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    nav a.active { color: #fff; border-bottom: 3px solid #4f8ef7; }

    .page {
      max-width: 480px;
      margin: 48px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.15s;
      outline: none;
    }

    select:focus, textarea:focus {
      border-color: #4f8ef7;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .field { margin-bottom: 20px; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-in  { background: #22c55e; color: #fff; }
    .btn-out { background: #ef4444; color: #fff; }

    .btn-in:hover:not(:disabled)  { opacity: 0.88; }
    .btn-out:hover:not(:disabled) { opacity: 0.88; }

    .status-banner {
      display: none;
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status-banner.active-shift {
      background: #fef9c3;
      border: 1.5px solid #fde047;
      color: #713f12;
      display: block;
    }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }

    .message.success { background: #dcfce7; border: 1.5px solid #86efac; color: #166534; display: block; }
    .message.error   { background: #fee2e2; border: 1.5px solid #fca5a5; color: #991b1b; display: block; }

    .note-field { display: none; }

    .shift-info { font-size: 0.9rem; margin-top: 4px; }
    .shift-info span { font-weight: 700; }
  </style>
</head>
<body>

<nav>
  <span class="brand">TimeTracker</span>
  <a href="/" class="active">Clock In/Out</a>
  <a href="/summary.html">Weekly Summary</a>
  <a href="/manual-entry.html">Manual Entry</a>
</nav>

<div class="page">
  <h1>Clock In / Out</h1>
  <p class="subtitle">Select your name to record your shift.</p>

  <div class="card">
    <div class="field">
      <label for="employee">Employee</label>
      <select id="employee">
        <option value="">— Select your name —</option>
      </select>
    </div>

    <div class="status-banner" id="statusBanner">
      <div>You are currently <strong>clocked in</strong>.</div>
      <div class="shift-info">Started: <span id="clockInTime">—</span></div>
    </div>

    <div class="field note-field" id="noteField">
      <label for="note">What did you work on?</label>
      <textarea id="note" placeholder="Brief description of your work…"></textarea>
    </div>

    <button class="btn btn-in" id="actionBtn" disabled>Clock In</button>

    <div class="message" id="message"></div>
  </div>
</div>

<script>
  const employeeEl = document.getElementById('employee');
  const actionBtn  = document.getElementById('actionBtn');
  const noteField  = document.getElementById('noteField');
  const noteEl     = document.getElementById('note');
  const statusBanner = document.getElementById('statusBanner');
  const clockInTimeEl = document.getElementById('clockInTime');
  const messageEl  = document.getElementById('message');

  let isClockedIn = false;

  async function loadEmployees() {
    const res = await fetch('/api/employees');
    const employees = await res.json();
    employees.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      employeeEl.appendChild(opt);
    });
  }

  function showMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = `message ${type}`;
    setTimeout(() => { messageEl.className = 'message'; }, 5000);
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  async function checkStatus(name) {
    if (!name) {
      actionBtn.disabled = true;
      statusBanner.className = 'status-banner';
      noteField.style.display = 'none';
      actionBtn.textContent = 'Clock In';
      actionBtn.className = 'btn btn-in';
      isClockedIn = false;
      return;
    }

    const res = await fetch(`/api/status/${encodeURIComponent(name)}`);
    const data = await res.json();

    actionBtn.disabled = false;
    messageEl.className = 'message';

    if (data.active) {
      isClockedIn = true;
      statusBanner.className = 'status-banner active-shift';
      clockInTimeEl.textContent = formatTime(data.active.clockIn);
      noteField.style.display = 'block';
      actionBtn.textContent = 'Clock Out';
      actionBtn.className = 'btn btn-out';
    } else {
      isClockedIn = false;
      statusBanner.className = 'status-banner';
      noteField.style.display = 'none';
      noteEl.value = '';
      actionBtn.textContent = 'Clock In';
      actionBtn.className = 'btn btn-in';
    }
  }

  employeeEl.addEventListener('change', () => checkStatus(employeeEl.value));

  actionBtn.addEventListener('click', async () => {
    const employee = employeeEl.value;
    if (!employee) return;

    actionBtn.disabled = true;

    if (isClockedIn) {
      const note = noteEl.value.trim();
      const res = await fetch('/api/clockout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employee, note })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage(`Clocked out successfully. Shift recorded.`, 'success');
        noteEl.value = '';
      } else {
        showMessage(data.error || 'An error occurred.', 'error');
      }
    } else {
      const res = await fetch('/api/clockin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employee })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage(`Clocked in successfully!`, 'success');
      } else {
        showMessage(data.error || 'An error occurred.', 'error');
      }
    }

    await checkStatus(employee);
  });

  loadEmployees();
</script>
</body>
</html>
